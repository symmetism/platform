name: Build and Publish

# Mirrors Reflexivity's build-and-publish.yml. Triggers on push to main
# when an app under apps/<name>/ changes. Builds the image, pushes to
# ghcr.io/symmetism/<name>:<sha> + :latest. Watchtower on the VPS
# picks up the new tag within 60s and rolls.

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - '.github/workflows/build-and-publish.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.changes.outputs.apps }}
      has_changes: ${{ steps.changes.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed app dirs
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            mapfile -t apps_arr < <(ls apps 2>/dev/null || true)
          elif ! git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            mapfile -t apps_arr < <(ls apps 2>/dev/null || true)
          else
            mapfile -t apps_arr < <(
              git diff --name-only HEAD~1 HEAD \
                | awk -F/ '/^apps\//{print $2}' \
                | sort -u
            )
          fi
          # Only include dirs that actually have a Dockerfile.
          built=()
          for a in "${apps_arr[@]}"; do
            [[ -f "apps/${a}/Dockerfile" ]] && built+=("$a")
          done
          apps_json=$(printf '%s\n' "${built[@]}" | awk 'NF' \
            | jq -R -s -c 'split("\n") | map(select(. != ""))')
          [[ -z "$apps_json" ]] && apps_json="[]"
          {
            echo "apps<<EOF"
            echo "$apps_json"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          if [[ "$apps_json" == "[]" ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Apps to build: $apps_json"

  build:
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ghcr.io/symmetism/${{ matrix.app }}:${{ github.sha }}
            ghcr.io/symmetism/${{ matrix.app }}:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          build-args: |
            IMAGE_GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max
