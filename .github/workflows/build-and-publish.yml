name: Build and Publish

# Mirrors Reflexivity's build-and-publish.yml. Builds + pushes
# ghcr.io/symmetism/<name>:<sha> + :latest for each app under
# apps/<name>/ that has a Dockerfile. Watchtower on the VPS picks
# up the new tag within 60s and rolls.
#
# We deliberately fire on EVERY push to main (no `paths` filter)
# so the server's reported commit_sha always matches git HEAD —
# this keeps Q_trinity_P / Q_trinity_R brackets conserved even
# when a commit only touches docs, README, .gitattributes, or
# tools/. The detect step below skips apps that lack a Dockerfile,
# and Buildx layer-cache makes no-content-change rebuilds cheap.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.changes.outputs.apps }}
      has_changes: ${{ steps.changes.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect app dirs to build
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          # Always build every app with a Dockerfile. We rely on Buildx
          # layer cache to keep no-content-change rebuilds cheap, and
          # this guarantees the server's IMAGE_GIT_SHA always matches
          # git HEAD — which is what Q_trinity_P checks against.
          mapfile -t apps_arr < <(ls apps 2>/dev/null || true)
          built=()
          for a in "${apps_arr[@]}"; do
            [[ -f "apps/${a}/Dockerfile" ]] && built+=("$a")
          done
          apps_json=$(printf '%s\n' "${built[@]}" | awk 'NF' \
            | jq -R -s -c 'split("\n") | map(select(. != ""))')
          [[ -z "$apps_json" ]] && apps_json="[]"
          {
            echo "apps<<EOF"
            echo "$apps_json"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          if [[ "$apps_json" == "[]" ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Apps to build: $apps_json"

  build:
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ghcr.io/symmetism/${{ matrix.app }}:${{ github.sha }}
            ghcr.io/symmetism/${{ matrix.app }}:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          build-args: |
            IMAGE_GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max
