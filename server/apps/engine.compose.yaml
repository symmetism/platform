# Per-app compose: engine (the Reflexivity physics app —
# falsifier, gap solver, Lean/GAP/PennyLane verifiers, math map).
# Renamed from reflexivity-webapp on 2026-05-07.
#
# Image is pulled from GHCR by Watchtower. Operator places the env
# file at /etc/symmetism/engine.env on the VPS containing:
#   SYMVERIFY_TOKEN=<32-byte hex>
#   FRAMEWORK_VERSION=<semver>          (optional)
#
# The label com.centurylinklabs.watchtower.enable=true is what makes
# Watchtower poll/upgrade this container. Removing the label freezes
# the image at whatever's currently deployed.

services:
  engine:
    image: ghcr.io/symmetism/engine:latest
    container_name: engine
    restart: unless-stopped
    pull_policy: always
    networks:
      - symmetism
    env_file:
      - /etc/symmetism/engine.env
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "org.symmetism.app=engine"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:5000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # No host port mapping — Caddy reaches it on the symmetism network.
    # Port 5000 is exposed at the container level by the Dockerfile.
