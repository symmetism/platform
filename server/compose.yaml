# Symmetism top-level docker-compose (battle plan F6).
#
# Orchestrates: Caddy (reverse proxy + auto-HTTPS) and Watchtower
# (30-second poll on labeled containers; rolling restart on new images).
#
# Per-app compose files live at server/apps/<name>.compose.yaml and
# are pulled in via the `include` directive — see bottom.
#
# ─────────────────────────────────────────────────────────────────
# CLAUDE ORIENTATION (read this first when you wake up here):
#   ▸ This file lives at /srv/symmetism/compose.yaml on the VPS
#     (72.167.34.12) — pushed there by `sym deploy` from the local
#     Platform/server/ tree. NOT a git clone on the VPS side.
#   ▸ Adding/renaming an app: add a per-app file under apps/ and
#     list it in the `include:` block at the bottom. `sym deploy`
#     picks up include-list deltas automatically (renames, removals).
#   ▸ Watchtower polls GHCR for new image tags every 30s. New
#     images are tagged `:latest` + `:<commit_sha>` by GHA on every
#     push. Don't expect updates faster than ~2-3 min end-to-end
#     (build + poll + roll).
#   ▸ Each app needs a sibling /etc/symmetism/<name>.env on the
#     VPS containing SYMVERIFY_TOKEN. `sym deploy` creates these
#     from ~/.symmetism/secrets/symverify.<name>.token if missing.
#   ▸ Caddy's admin API is OFF (admin off in Caddyfile). To reload
#     config: `docker restart caddy`. `sym deploy` does this
#     automatically after applying Caddyfile changes.
# ─────────────────────────────────────────────────────────────────

name: symmetism

services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    networks:
      - symmetism
    # Caddy admin API is disabled in our Caddyfile; use a port probe via
    # wget against the reverse-proxied health endpoint instead. We reach
    # the webapp through Caddy's local proxy on port 80 → reflexivity-
    # webapp:5000/healthz, so this also implicitly tests the proxy.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  watchtower:
    # Using beatkind/watchtower (maintained fork, v2.3.2+) instead of
    # containrrr/watchtower:latest because the latter still uses Docker
    # API client v1.25 which Docker 29.x rejects (minimum API 1.40).
    # Pin to :latest of the fork; we'll bump explicitly when needed.
    image: beatkind/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=UTC
      # 30s poll halves the median time-to-deploy after a push (was 60s).
      # Higher GHCR rate-limit cost is negligible for one operator.
      - WATCHTOWER_POLL_INTERVAL=30          # seconds
      - WATCHTOWER_LABEL_ENABLE=true         # only update opted-in containers
      - WATCHTOWER_CLEANUP=true              # remove old images
      - WATCHTOWER_ROLLING_RESTART=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - WATCHTOWER_NOTIFICATIONS=
    command: ["--interval", "30", "--label-enable", "--cleanup", "--rolling-restart"]

networks:
  symmetism:
    name: symmetism
    driver: bridge

volumes:
  caddy_data:
    name: caddy_data
  caddy_config:
    name: caddy_config
  caddy_logs:
    name: caddy_logs

include:
  - apps/engine.compose.yaml
  - apps/landing.compose.yaml
  - apps/attestation-service.compose.yaml
